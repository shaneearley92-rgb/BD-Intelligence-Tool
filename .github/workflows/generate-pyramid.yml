name: Generate Sales Pyramid

on:
  workflow_dispatch:
    inputs:
      company_id:
        description: 'Company ID'
        required: true
      company_name:
        description: 'Company name'
        required: true
      company_domain:
        description: 'Company domain'
        required: false
        default: ''

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci

      - name: Generate pyramid
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          COMPANY_ID: ${{ github.event.inputs.company_id }}
          COMPANY_NAME: ${{ github.event.inputs.company_name }}
          COMPANY_DOMAIN: ${{ github.event.inputs.company_domain }}
        run: node scripts/generate-pyramid.js
