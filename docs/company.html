<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Detail - BD Intelligence Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: #0a0e17;
            color: #e2e8f0;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            border-bottom: 1px solid #1e3a5f;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 { font-size: 1.25rem; font-weight: 600; color: #38bdf8; }
        .header a { color: #94a3b8; text-decoration: none; font-size: 0.85rem; }
        .header a:hover { color: #e2e8f0; }

        .container { max-width: 1400px; margin: 0 auto; padding: 1.5rem 2rem; }

        .btn {
            padding: 0.5rem 1rem; border-radius: 6px; border: 1px solid #334155;
            background: #1e293b; color: #e2e8f0; font-size: 0.85rem; cursor: pointer;
            transition: all 0.15s;
        }
        .btn:hover { background: #334155; }
        .btn-primary { background: #0369a1; border-color: #0284c7; color: white; }
        .btn-primary:hover { background: #0284c7; }
        .btn-sm { padding: 0.35rem 0.75rem; font-size: 0.8rem; }

        /* Company header */
        .company-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1.5rem;
        }

        .company-header h2 { font-size: 1.5rem; font-weight: 700; }
        .company-meta { color: #94a3b8; font-size: 0.85rem; margin-top: 0.25rem; }

        /* Panels */
        .panel {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            overflow: hidden; margin-bottom: 1.5rem;
        }
        .panel-header {
            padding: 1rem 1.25rem; border-bottom: 1px solid #334155;
            display: flex; justify-content: space-between; align-items: center;
        }
        .panel-header h3 { font-size: 1rem; font-weight: 600; }
        .panel-body { padding: 1.25rem; }

        /* Grid */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }

        /* Tabs */
        .tabs { display: flex; gap: 0; border-bottom: 1px solid #334155; margin-bottom: 1.5rem; }
        .tab {
            padding: 0.75rem 1.25rem; font-size: 0.85rem; cursor: pointer;
            border-bottom: 2px solid transparent; color: #94a3b8; transition: all 0.15s;
        }
        .tab:hover { color: #e2e8f0; }
        .tab.active { color: #38bdf8; border-bottom-color: #38bdf8; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* Contact cards */
        .contact-card {
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            padding: 1rem; margin-bottom: 0.75rem;
        }
        .contact-name { font-weight: 600; font-size: 0.95rem; }
        .contact-title { color: #94a3b8; font-size: 0.8rem; margin-top: 0.15rem; }
        .contact-meta { display: flex; gap: 1rem; margin-top: 0.5rem; font-size: 0.75rem; color: #64748b; }
        .contact-meta a { color: #38bdf8; text-decoration: none; }

        /* Signal cards */
        .signal-card {
            background: #0f172a; border-left: 3px solid #0284c7;
            padding: 0.75rem 1rem; margin-bottom: 0.5rem; border-radius: 0 6px 6px 0;
        }
        .signal-card.high { border-left-color: #22c55e; }
        .signal-card.medium { border-left-color: #eab308; }
        .signal-card.low { border-left-color: #64748b; }
        .signal-text { font-size: 0.85rem; }
        .signal-meta { font-size: 0.7rem; color: #64748b; margin-top: 0.25rem; }

        /* Content cards */
        .content-card {
            background: #0f172a; border: 1px solid #334155; border-radius: 8px;
            padding: 1rem; margin-bottom: 0.75rem;
        }
        .content-card h4 { font-size: 0.9rem; margin-bottom: 0.5rem; }
        .content-card pre {
            white-space: pre-wrap; font-size: 0.8rem; color: #cbd5e1;
            line-height: 1.5; max-height: 300px; overflow-y: auto;
        }
        .content-type-badge {
            display: inline-block; padding: 0.15rem 0.5rem; border-radius: 10px;
            font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
            background: #1e3a5f; color: #38bdf8;
        }

        /* Status badges */
        .status-badge {
            display: inline-block; padding: 0.2rem 0.6rem; border-radius: 12px;
            font-size: 0.7rem; font-weight: 600; text-transform: uppercase;
        }
        .status-completed { background: #064e3b; color: #34d399; }
        .status-running { background: #78350f; color: #fbbf24; }
        .status-failed { background: #7f1d1d; color: #f87171; }
        .status-pending { background: #374151; color: #9ca3af; }
        .status-draft { background: #1e3a5f; color: #38bdf8; }
        .status-approved { background: #064e3b; color: #34d399; }

        .summary-text { font-size: 0.875rem; line-height: 1.6; color: #cbd5e1; }
        .loading { text-align: center; padding: 2rem; color: #64748b; }

        /* Modal */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7);
            z-index: 100; justify-content: center; align-items: center;
        }
        .modal-overlay.active { display: flex; }
        .modal {
            background: #1e293b; border: 1px solid #334155; border-radius: 12px;
            padding: 1.5rem; width: 100%; max-width: 500px;
        }
        .modal h3 { font-size: 1.1rem; margin-bottom: 1rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; color: #94a3b8; margin-bottom: 0.35rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 0.5rem 0.75rem; background: #0f172a;
            border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; font-size: 0.875rem;
        }
        .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1.25rem; }

        .toast {
            position: fixed; bottom: 2rem; right: 2rem; padding: 0.75rem 1.25rem;
            background: #065f46; border: 1px solid #047857; border-radius: 8px;
            color: #d1fae5; font-size: 0.85rem; z-index: 200; display: none;
        }
        .toast.error { background: #7f1d1d; border-color: #991b1b; color: #fecaca; }
        .toast.active { display: block; }

        @media (max-width: 768px) { .grid-2 { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <a href="index.html">&larr; Back to Dashboard</a>
            <h1 id="page-title">Loading...</h1>
        </div>
        <div style="display: flex; gap: 0.75rem;">
            <button class="btn" onclick="openAddContact()">+ Add Contact</button>
            <button class="btn btn-primary" onclick="runResearch()">Run Research</button>
        </div>
    </div>

    <div class="container">
        <!-- Company Info -->
        <div class="grid-2" id="company-info">
            <div class="loading">Loading company data...</div>
        </div>

        <!-- Tabs -->
        <div class="tabs" id="tabs">
            <div class="tab active" data-tab="contacts" onclick="switchTab('contacts')">Contacts</div>
            <div class="tab" data-tab="intelligence" onclick="switchTab('intelligence')">Intelligence</div>
            <div class="tab" data-tab="content" onclick="switchTab('content')">Outreach Content</div>
            <div class="tab" data-tab="history" onclick="switchTab('history')">Research History</div>
        </div>

        <!-- Contacts Tab -->
        <div class="tab-content active" id="tab-contacts">
            <div id="contacts-list"><div class="loading">Loading contacts...</div></div>
        </div>

        <!-- Intelligence Tab -->
        <div class="tab-content" id="tab-intelligence">
            <div id="intelligence-content"><div class="loading">Run research to generate intelligence.</div></div>
        </div>

        <!-- Outreach Content Tab -->
        <div class="tab-content" id="tab-content">
            <div id="outreach-content"><div class="loading">Run research to generate outreach content.</div></div>
        </div>

        <!-- Research History Tab -->
        <div class="tab-content" id="tab-history">
            <div id="research-history"><div class="loading">No research runs yet.</div></div>
        </div>
    </div>

    <!-- Add Contact Modal -->
    <div class="modal-overlay" id="modal-add-contact">
        <div class="modal">
            <h3>Add Contact</h3>
            <div class="form-group">
                <label>Full Name *</label>
                <input type="text" id="contact-name" placeholder="e.g. Jane Smith">
            </div>
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="contact-title" placeholder="e.g. CISO">
            </div>
            <div class="form-group">
                <label>Seniority</label>
                <select id="contact-seniority">
                    <option value="">Select...</option>
                    <option value="C-Suite">C-Suite</option>
                    <option value="VP">VP</option>
                    <option value="Director">Director</option>
                    <option value="Manager">Manager</option>
                </select>
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="contact-email">
            </div>
            <div class="form-group">
                <label>LinkedIn URL</label>
                <input type="url" id="contact-linkedin" placeholder="https://linkedin.com/in/...">
            </div>
            <div class="modal-actions">
                <button class="btn" onclick="closeModal('modal-add-contact')">Cancel</button>
                <button class="btn btn-primary" onclick="addContact()">Add Contact</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===========================================
        // CONFIGURATION
        // ===========================================
        const CONFIG = {
            SUPABASE_URL: 'https://axoociwagtamyepfvyeq.supabase.co',
            SUPABASE_ANON_KEY: 'sb_publishable_cqrID5e3KxU2YONXLzTlCA_QK__Lim3',
            GITHUB_OWNER: 'shaneearley92-rgb',
            GITHUB_REPO: 'BD-Intelligence-Tool',
            GITHUB_PAT: localStorage.getItem('bd_github_pat') || '',
        };

        function getGitHubPAT() {
            if (CONFIG.GITHUB_PAT) return CONFIG.GITHUB_PAT;
            const pat = prompt('Enter your GitHub Personal Access Token (Fine-grained, with Actions:write permission).\n\nThis will be saved in your browser localStorage.');
            if (pat) {
                localStorage.setItem('bd_github_pat', pat);
                CONFIG.GITHUB_PAT = pat;
                return pat;
            }
            return null;
        }

        const COMPANY_ID = new URLSearchParams(window.location.search).get('id');

        // ===========================================
        // SUPABASE CLIENT
        // ===========================================
        async function supabaseQuery(table, options = {}) {
            let url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}`;
            const params = new URLSearchParams();
            if (options.select) params.set('select', options.select);
            if (options.filter) {
                for (const [key, val] of Object.entries(options.filter)) params.set(key, val);
            }
            if (options.order) params.set('order', options.order);
            if (options.limit) params.set('limit', String(options.limit));
            const queryStr = params.toString();
            if (queryStr) url += `?${queryStr}`;
            const resp = await fetch(url, {
                method: options.method || 'GET',
                headers: {
                    'apikey': CONFIG.SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${CONFIG.SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                },
                body: options.body ? JSON.stringify(options.body) : undefined,
            });
            if (!resp.ok) throw new Error(`Supabase error ${resp.status}`);
            return resp.json();
        }

        async function supabaseInsert(table, record) {
            const url = `${CONFIG.SUPABASE_URL}/rest/v1/${table}`;
            const resp = await fetch(url, {
                method: 'POST',
                headers: {
                    'apikey': CONFIG.SUPABASE_ANON_KEY,
                    'Authorization': `Bearer ${CONFIG.SUPABASE_ANON_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=representation',
                },
                body: JSON.stringify(record),
            });
            if (!resp.ok) throw new Error(`Insert error ${resp.status}`);
            return resp.json();
        }

        async function triggerWorkflow(workflowFile, inputs = {}) {
            const url = `https://api.github.com/repos/${CONFIG.GITHUB_OWNER}/${CONFIG.GITHUB_REPO}/actions/workflows/${workflowFile}/dispatches`;
            const resp = await fetch(url, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${CONFIG.GITHUB_PAT}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ ref: 'main', inputs }),
            });
            if (!resp.ok) throw new Error(`GitHub API error ${resp.status}`);
        }

        // ===========================================
        // PAGE LOGIC
        // ===========================================

        let companyData = null;

        async function loadCompany() {
            if (!COMPANY_ID) { document.getElementById('page-title').textContent = 'No company ID'; return; }
            try {
                const data = await supabaseQuery('companies', {
                    select: '*',
                    filter: { id: `eq.${COMPANY_ID}` },
                });
                companyData = data[0];
                if (!companyData) { document.getElementById('page-title').textContent = 'Company not found'; return; }
                document.getElementById('page-title').textContent = companyData.name;
                document.title = `${companyData.name} - BD Intelligence Tool`;

                document.getElementById('company-info').innerHTML = `
                    <div class="panel">
                        <div class="panel-header"><h3>Company Details</h3></div>
                        <div class="panel-body">
                            <p><strong>Domain:</strong> ${companyData.domain || 'N/A'}</p>
                            <p><strong>Industry:</strong> ${companyData.industry || 'N/A'}</p>
                            <p><strong>Employees:</strong> ${companyData.employee_count ? companyData.employee_count.toLocaleString() : 'N/A'}</p>
                            <p><strong>Ticker:</strong> ${companyData.ticker || 'N/A'}</p>
                            <p><strong>Status:</strong> <span class="status-badge status-${companyData.research_status}">${companyData.research_status || 'N/A'}</span></p>
                        </div>
                    </div>
                    <div class="panel">
                        <div class="panel-header"><h3>Additional Info</h3></div>
                        <div class="panel-body">
                            <p><strong>Public:</strong> ${companyData.is_public ? 'Yes' : 'No'}</p>
                            <p><strong>Last Researched:</strong> ${companyData.last_researched_at ? new Date(companyData.last_researched_at).toLocaleString() : 'Never'}</p>
                        </div>
                    </div>`;
            } catch (e) {
                console.error('Failed to load company:', e);
            }
        }

        async function loadContacts() {
            try {
                const contacts = await supabaseQuery('contacts', {
                    select: '*',
                    filter: { company_id: `eq.${COMPANY_ID}` },
                    order: 'created_at.asc',
                });
                if (!contacts.length) {
                    document.getElementById('contacts-list').innerHTML = '<div class="loading">No contacts yet. Add one above.</div>';
                    return;
                }
                document.getElementById('contacts-list').innerHTML = contacts.map(c => `
                    <div class="contact-card">
                        <div class="contact-name">${c.name}</div>
                        <div class="contact-title">${c.title || 'No title'} ${c.seniority ? `| ${c.seniority}` : ''}</div>
                        <div class="contact-meta">
                            ${c.email ? `<span>Email: ${c.email}</span>` : ''}
                            ${c.linkedin_url ? `<a href="${c.linkedin_url}" target="_blank">LinkedIn</a>` : ''}
                            <span>Source: ${c.enrichment_source || 'manual'}</span>
                        </div>
                    </div>`).join('');
            } catch (e) {
                console.error('Failed to load contacts:', e);
            }
        }

        async function loadIntelligence() {
            try {
                // Load synthesis snapshot from research_snapshots
                const snapshots = await supabaseQuery('research_snapshots', {
                    select: 'summary,signals,source,created_at',
                    filter: { company_id: `eq.${COMPANY_ID}`, source: 'eq.synthesis' },
                    order: 'created_at.desc',
                    limit: 1,
                });
                if (!snapshots.length) {
                    document.getElementById('intelligence-content').innerHTML = '<div class="loading">No intelligence yet. Run research first.</div>';
                    return;
                }
                const snap = snapshots[0];
                const signals = snap.signals || {};
                let html = '';

                if (snap.summary) {
                    html += `<div class="panel"><div class="panel-header"><h3>Company Intelligence Brief</h3></div>
                        <div class="panel-body"><div class="summary-text">${snap.summary}</div></div></div>`;
                }

                if (signals.keySignals && signals.keySignals.length) {
                    html += `<div class="panel"><div class="panel-header"><h3>Key Buying Signals</h3></div><div class="panel-body">`;
                    for (const s of signals.keySignals) {
                        html += `<div class="signal-card ${s.strength || 'medium'}">
                            <div class="signal-text">${s.signal}</div>
                            <div class="signal-meta">Source: ${s.source || 'N/A'} | Angle: ${s.salesAngle || s.sales_angle || 'N/A'}</div>
                        </div>`;
                    }
                    html += '</div></div>';
                }

                if (signals.painPoints && signals.painPoints.length) {
                    html += `<div class="panel"><div class="panel-header"><h3>Pain Points</h3></div><div class="panel-body">`;
                    for (const p of signals.painPoints) {
                        html += `<div class="signal-card medium">
                            <div class="signal-text">${p.painPoint || p.pain_point}</div>
                            <div class="signal-meta">Evidence: ${p.evidence || 'N/A'}</div>
                        </div>`;
                    }
                    html += '</div></div>';
                }

                if (signals.competitiveLandscape && signals.competitiveLandscape.summary) {
                    html += `<div class="panel"><div class="panel-header"><h3>Competitive Landscape</h3></div>
                        <div class="panel-body"><div class="summary-text">${signals.competitiveLandscape.summary}</div>
                        ${signals.competitiveLandscape.knownVendors?.length ? `<p style="margin-top:0.75rem"><strong>Known Vendors:</strong> ${signals.competitiveLandscape.knownVendors.join(', ')}</p>` : ''}
                        </div></div>`;
                }

                document.getElementById('intelligence-content').innerHTML = html || '<div class="loading">No intelligence data available.</div>';
            } catch (e) {
                console.error('Failed to load intelligence:', e);
            }
        }

        async function loadOutreachContent() {
            try {
                const content = await supabaseQuery('outreach_content', {
                    select: '*',
                    filter: { company_id: `eq.${COMPANY_ID}` },
                    order: 'created_at.desc',
                });
                if (!content.length) {
                    document.getElementById('outreach-content').innerHTML = '<div class="loading">No outreach content yet. Run research first.</div>';
                    return;
                }

                document.getElementById('outreach-content').innerHTML = content.map(c => {
                    let cards = '';
                    if (c.pitch_angle) {
                        cards += `<div class="content-card"><h4><span class="content-type-badge">Pitch Angle</span></h4><pre>${escapeHtml(c.pitch_angle)}</pre></div>`;
                    }
                    if (c.email_draft) {
                        cards += `<div class="content-card"><h4><span class="content-type-badge">Email Draft</span> ${c.email_subject ? escapeHtml(c.email_subject) : ''}</h4><pre>${escapeHtml(c.email_draft)}</pre></div>`;
                    }
                    if (c.linkedin_sequence) {
                        const seq = typeof c.linkedin_sequence === 'string' ? JSON.parse(c.linkedin_sequence) : c.linkedin_sequence;
                        cards += `<div class="content-card"><h4><span class="content-type-badge">LinkedIn Sequence</span></h4>
                            <pre><strong>Connection Request:</strong>\n${escapeHtml(seq.connectionRequest || '')}\n\n<strong>Follow-up:</strong>\n${escapeHtml(seq.followUp || '')}</pre></div>`;
                    }
                    if (c.call_talk_track) {
                        cards += `<div class="content-card"><h4><span class="content-type-badge">Call Talk Track</span></h4><pre>${escapeHtml(c.call_talk_track)}</pre></div>`;
                    }
                    if (c.discovery_questions && c.discovery_questions.length) {
                        cards += `<div class="content-card"><h4><span class="content-type-badge">Discovery Questions</span></h4>
                            <pre>${c.discovery_questions.map((q, i) => `${i + 1}. ${escapeHtml(q)}`).join('\n')}</pre></div>`;
                    }
                    if (c.exec_briefing) {
                        cards += `<div class="content-card"><h4><span class="content-type-badge">Executive Briefing</span></h4><pre>${escapeHtml(c.exec_briefing)}</pre></div>`;
                    }
                    return cards;
                }).join('<hr style="border-color:#334155;margin:1rem 0">');
            } catch (e) {
                console.error('Failed to load outreach content:', e);
            }
        }

        async function loadHistory() {
            try {
                const runs = await supabaseQuery('research_runs', {
                    select: 'id,status,triggered_by,actual_tokens,started_at,completed_at,error_message',
                    filter: { company_id: `eq.${COMPANY_ID}` },
                    order: 'started_at.desc',
                    limit: 20,
                });
                if (!runs.length) {
                    document.getElementById('research-history').innerHTML = '<div class="loading">No research runs yet.</div>';
                    return;
                }
                document.getElementById('research-history').innerHTML = runs.map(r => `
                    <div class="contact-card">
                        <div style="display:flex;justify-content:space-between;align-items:center">
                            <span class="status-badge status-${r.status}">${r.status}</span>
                            <span style="font-size:0.75rem;color:#64748b">${r.started_at ? new Date(r.started_at).toLocaleString() : 'N/A'}</span>
                        </div>
                        <div style="font-size:0.8rem;margin-top:0.5rem;color:#94a3b8">
                            Triggered: ${r.triggered_by || 'manual'}
                            ${r.actual_tokens ? ` | Tokens: ${r.actual_tokens.toLocaleString()}` : ''}
                        </div>
                        ${r.error_message ? `<div style="font-size:0.75rem;color:#f87171;margin-top:0.25rem">${r.error_message}</div>` : ''}
                    </div>`).join('');
            } catch (e) {
                console.error('Failed to load history:', e);
            }
        }

        // ===========================================
        // ACTIONS
        // ===========================================

        async function runResearch() {
            if (!getGitHubPAT()) { showToast('GitHub PAT is required to trigger research.', true); return; }
            try {
                await triggerWorkflow('research.yml', { company_id: COMPANY_ID });
                showToast('Research started. Check GitHub Actions for progress.');
            } catch (e) {
                showToast(`Failed: ${e.message}`, true);
            }
        }

        function openAddContact() {
            document.getElementById('modal-add-contact').classList.add('active');
        }

        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        async function addContact() {
            const name = document.getElementById('contact-name').value.trim();
            if (!name) { showToast('Name is required', true); return; }
            try {
                await supabaseInsert('contacts', {
                    company_id: COMPANY_ID,
                    name,
                    title: document.getElementById('contact-title').value.trim() || null,
                    seniority: document.getElementById('contact-seniority').value || null,
                    email: document.getElementById('contact-email').value.trim() || null,
                    linkedin_url: document.getElementById('contact-linkedin').value.trim() || null,
                    enrichment_source: 'manual',
                });
                closeModal('modal-add-contact');
                showToast(`Added ${name}`);
                loadContacts();
            } catch (e) {
                showToast(`Failed: ${e.message}`, true);
            }
        }

        // ===========================================
        // UI HELPERS
        // ===========================================

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`[data-tab="${tabName}"]`).classList.add('active');
            document.getElementById(`tab-${tabName}`).classList.add('active');

            // Lazy load tab content
            if (tabName === 'intelligence') loadIntelligence();
            if (tabName === 'content') loadOutreachContent();
            if (tabName === 'history') loadHistory();
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = `toast active${isError ? ' error' : ''}`;
            setTimeout(() => t.classList.remove('active'), 4000);
        }

        function escapeHtml(str) {
            return str.replace(/&/g, '&amp;').replace(/\x3c/g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        document.querySelectorAll('.modal-overlay').forEach(o => {
            o.addEventListener('click', e => { if (e.target === o) o.classList.remove('active'); });
        });

        // ===========================================
        // INIT
        // ===========================================
        if (CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY && COMPANY_ID) {
            loadCompany();
            loadContacts();
        } else if (!COMPANY_ID) {
            document.getElementById('page-title').textContent = 'No company selected';
            document.getElementById('company-info').innerHTML = '<div class="loading">Go back to the dashboard and click a company.</div>';
        } else {
            document.getElementById('company-info').innerHTML = '<div class="loading">Configure SUPABASE_URL and SUPABASE_ANON_KEY in CONFIG.</div>';
        }
    </script>
</body>
</html>
